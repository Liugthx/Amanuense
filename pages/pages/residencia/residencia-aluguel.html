<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residencia Aluguel</title>
</head>
<body>

    <header>
        <h1>Residencia Aluguel</h1>
    </header>

    <main class="conteiner">

        <div class="conteiner-left">
            <!--VISUALIZAÇÃO DO MODELO ESCOLHIDO-->
        </div>

        <div class="conteiner-right">
            <!--FORMULARIO COM OBJETIVO DE INTERAÇÃO COM USUARIO-->

            <form action="">
                <fieldset>

                    <div class="form-group obrigatorio">
                        <label for="">Sexualidade do Dono (a): <span>*</span></label>

                        <input type="radio" name="sexualidadeDono" id="masculino" value="masculino">
                        <label for="masculino">Masculino</label>

                        <input type="radio" name="sexualidadeDono" id="feminino" value="feminino">
                        <label for="feminino">Feminino</label>

                    </div>

                    <div class="form-group obrigatorio">
                        <label for="">Nome completo do Dono (a) do Imovel: <span>*</span> </label>
                        <input class="form-control" type="text" required>
                    </div>

                    <div class="form-group obrigatorio">
                        <label for="">Profissão do Dono (a): <span>*</span> </label>
                        <input class="form-control" type="text" required>
                    </div>

                     <div class="form-group obrigatorio">
                        <label for="">RG do Dono: <span>*</span> </label>
                        <input class="form-control" type="text" required>
                    </div>

                     <div class="form-group obrigatorio">
                        <label for="">CPF do Dono: <span>*</span> </label>
                        <input class="form-control" type="text" required>
                    </div>

                     <div class="form-group obrigatorio">
                        <label for="">Data de Nascimento do Dono: <span>*</span> </label>
                        <input class="form-control" type="text" required>
                    </div>

                     <div class="form-group obrigatorio">
                        <label for="">Profissão do Dono: <span>*</span> </label>
                        <input class="form-control" type="text" required>
                    </div>

                </fieldset>
            </form>
        </div>

    </main>
    
</body>
</html>
