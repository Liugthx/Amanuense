<!doctype html>
<html lang="pt-br">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amanuense</title>
  </head>
  <body>
    <header>
      <h1>Gerador de Contratos Dinamico</h1>

    <section>

      <div class="form-group">
        <input
          type="file"
          name="modelo_inserido"
          id="modelo_inserido"
          accept="text/txt"
        />
      </div>
    </section>

    <div class="container">

      <section>
        <h3>Visualização de Texto </h3>
        <div class="output"></div>
      </section>

      <section>
        <h3>Campos Detectados:</h3>
        <div class="form-dynamic">

        </div>

        <div>
            <button onclick="loadDocument()" >Gerar Contrato</button>
        </div>
      </section>

    </div>

  </body>

  <script src="./js/script.js"></script>
</html>
